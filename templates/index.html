<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Student Performance Predictor</h1>
      <p>Enter the student details and predict the final academic grade.</p>
      <form id="prediction-form">
        <div class="field-group">
          <label for="study_hours">Study Hours Per Day</label>
          <input id="study_hours" name="study_hours" type="number" step="0.1" min="0" max="12" required />
        </div>
        <div class="field-group">
          <label for="attendance">Attendance Percentage</label>
          <input id="attendance" name="attendance" type="number" step="0.1" min="0" max="100" required />
        </div>
        <div class="field-group">
          <label for="assignments">Assignments Completed</label>
          <input id="assignments" name="assignments" type="number" min="0" max="10" required />
        </div>
        <div class="field-group">
          <label for="previous_marks">Previous Semester Marks</label>
          <input id="previous_marks" name="previous_marks" type="number" step="0.1" min="0" max="100" required />
        </div>
        <div class="field-group">
          <label for="participation">Class Participation (1-5)</label>
          <input id="participation" name="participation" type="number" min="1" max="5" required />
        </div>
        <button type="submit">Predict Performance</button>
      </form>
      <div id="result" class="result"></div>
    </div>

    <script>
      const form = document.getElementById("prediction-form");
      const resultBox = document.getElementById("result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        resultBox.textContent = "Predicting...";

        const data = {
          study_hours: document.getElementById("study_hours").value,
          attendance: document.getElementById("attendance").value,
          assignments: document.getElementById("assignments").value,
          previous_marks: document.getElementById("previous_marks").value,
          participation: document.getElementById("participation").value,
        };

        try {
          const response = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const json = await response.json();
          if (!json.success) {
            resultBox.textContent = json.message || "Prediction failed.";
            return;
          }

          resultBox.innerHTML = `
            <p><strong>Predicted Grade:</strong> ${json.predicted_grade}</p>
            <p><strong>Performance Category:</strong> ${json.performance_category}</p>
            <p>${json.message}</p>
          `;
        } catch (error) {
          resultBox.textContent = "Unable to reach the prediction service.";
        }
      });
    </script>
  </body>
</html>
